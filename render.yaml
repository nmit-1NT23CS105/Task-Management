services:
  # FastAPI Backend Service
  - type: web
    name: task-management-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set by the user to their managed MySQL database URL (e.g. Aiven, Clever Cloud, etc.)
      - key: JWT_SECRET_KEY
        generateValue: true # Render will automatically generate a secure random key
      - key: CREATE_TABLES_ON_STARTUP
        value: "true" # Enables automatic schema tables creation on startup
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: FRONTEND_ORIGIN
        value: https://task-management-frontend.onrender.com # Update this if your frontend service name is different

  # React Frontend (Vite) Static Site
  - type: web
    name: task-management-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://task-management-backend.onrender.com/api # Update this if your backend service name is different
